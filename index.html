<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>AI狙购-BSC Sniper</title><style>:root{--bg:#050810;--bg2:#080d1a;--bg3:#0d1526;--border:#1a2a4a;--accent:#00e5ff;--accent2:#00ff88;--accent3:#ff3d71;--warn:#ffaa00;--text:#c8d8f0;--text2:#5a7aaa}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:sans-serif;min-height:100vh}.app{max-width:1100px;margin:0 auto;padding:12px}header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--bg2);border-bottom:2px solid var(--accent);margin-bottom:12px;font-family:monospace}.logo{font-size:16px;color:var(--accent);letter-spacing:2px}.sbar{font-size:11px;display:flex;gap:12px}.sdot{width:8px;height:8px;border-radius:50%;background:var(--text2);display:inline-block;margin-right:4px}.sdot.on{background:var(--accent2);animation:blink 1s infinite}@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}.sc{background:var(--bg2);border:1px solid var(--border);padding:10px;position:relative}.sc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px}.c1::after{background:var(--accent)}.c2::after{background:var(--accent2)}.c3::after{background:var(--warn)}.c4::after{background:var(--accent3)}.sl{font-size:9px;color:var(--text2);letter-spacing:2px;margin-bottom:3px}.sv{font-size:18px;font-weight:700;font-family:monospace}.c1 .sv{color:var(--accent)}.c2 .sv{color:var(--accent2)}.c3 .sv{color:var(--warn)}.c4 .sv{color:var(--accent3)}.grid{display:grid;grid-template-columns:290px 1fr;gap:12px}.cl,.cr{display:flex;flex-direction:column;gap:12px}.panel{background:var(--bg2);border:1px solid var(--border)}.ph{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}.pt{font-size:10px;letter-spacing:2px;color:var(--accent);font-family:monospace}.pb{padding:12px}.field{margin-bottom:10px}.field label{display:block;font-size:9px;color:var(--text2);margin-bottom:4px;letter-spacing:2px;text-transform:uppercase}.field input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 10px;font-family:monospace;font-size:11px;outline:none}.fr{display:grid;grid-template-columns:1fr 1fr;gap:8px}.hint{font-size:9px;color:var(--text2);margin-top:2px}.tr{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(26,42,74,.4)}.tgl{width:36px;height:18px;background:var(--bg3);border:1px solid var(--border);border-radius:9px;cursor:pointer;position:relative;flex-shrink:0}.tgl.on{background:rgba(0,255,136,.2);border-color:var(--accent2)}.tgl::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:var(--text2);transition:transform .2s}.tgl.on::after{transform:translateX(18px);background:var(--accent2)}.btn{padding:9px;font-size:13px;font-weight:700;cursor:pointer;border:none;width:100%;letter-spacing:2px;text-transform:uppercase}.bp{background:rgba(0,229,255,.1);border:1px solid var(--accent);color:var(--accent)}.bp.run{background:rgba(0,255,136,.1);border-color:var(--accent2);color:var(--accent2)}.bd{background:rgba(255,61,113,.1);border:1px solid var(--accent3);color:var(--accent3);margin-top:6px;font-size:12px}.bsm{padding:4px 8px;font-size:9px;background:transparent;border:1px solid var(--border);color:var(--text2);cursor:pointer}.logw{background:var(--bg);height:200px;overflow-y:auto;font-family:monospace;font-size:11px;padding:8px;border:1px solid var(--border)}.ll{padding:2px 0;display:flex;gap:6px;border-bottom:1px solid rgba(26,42,74,.2)}.lt{color:var(--text2);font-size:10px;flex-shrink:0}.ltg{font-size:9px;padding:1px 4px;border-radius:2px;font-weight:700;flex-shrink:0}.ti{background:rgba(0,229,255,.1);color:var(--accent)}.tb{background:rgba(0,255,136,.1);color:var(--accent2)}.tw{background:rgba(255,170,0,.1);color:var(--warn)}.te{background:rgba(255,61,113,.1);color:var(--accent3)}.ts{background:rgba(90,122,170,.1);color:var(--text2)}.lm{color:var(--text);flex:1;word-break:break-all}table{width:100%;border-collapse:collapse;font-family:monospace;font-size:11px}th{padding:6px 8px;text-align:left;font-size:9px;color:var(--text2);border-bottom:1px solid var(--border);background:var(--bg3)}td{padding:6px 8px;border-bottom:1px solid rgba(26,42,74,.3)}.gn{color:var(--accent2)}.rn{color:var(--accent3)}.wb{border:1px solid rgba(255,170,0,.3);padding:8px;font-size:9px;color:var(--warn);margin-top:6px;line-height:1.6}input[type=range]{width:100%;height:3px;-webkit-appearance:none;background:var(--border);outline:none}input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer}.abox{background:rgba(255,61,113,.08);border:1px solid var(--accent3);padding:10px;margin-bottom:8px;font-family:monospace;font-size:11px;animation:ap 1.5s infinite}@keyframes ap{0%,100%{border-color:var(--accent3)}50%{border-color:rgba(255,61,113,.2)}}.tgok{background:rgba(0,255,136,.05);border:1px solid rgba(0,255,136,.3);padding:8px;font-size:10px;color:var(--accent2);margin-bottom:8px;font-family:monospace}@media(max-width:700px){.grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}</style></head>
<body><div class="app"><header><div class="logo">⚡ AI狙购 · BSC SNIPER v3.0</div><div class="sbar"><span><span class="sdot" id="connDot"></span><span id="connText">未连接</span></span><span id="blockNum">Block:—</span><span id="bnbPrice">BNB:$—</span></div></header><div class="stats"><div class="sc c1"><div class="sl">监听配对</div><div class="sv" id="statPairs">0</div></div><div class="sc c2"><div class="sl">狙击成功</div><div class="sv" id="statBuys">0</div></div><div class="sc c3"><div class="sl">投入BNB</div><div class="sv" id="statSpent">0.00</div></div><div class="sc c4"><div class="sl">总盈亏</div><div class="sv" id="statPnl">+0.00</div></div></div><div id="alertArea"></div><div class="grid"><div class="cl"><div class="panel"><div class="ph"><span class="pt">🔌 节点配置</span><button class="bsm" onclick="testConn()">TEST</button></div><div class="pb"><div class="field"><label>WSS节点</label><input id="wssUrl" value="wss://bsc-ws-node.nariox.org:443"><div class="hint">⚡公共节点可用</div></div><div class="field"><label>钱包私钥</label><input type="password" id="pk" placeholder="0x..."><div class="hint">🔒仅本地不上传</div></div></div></div><div class="panel"><div class="ph"><span class="pt">📱 Telegram推送</span><button class="bsm" onclick="testTG()">测试</button></div><div class="pb"><div class="tgok">✅ Telegram已配置<br>Bot: @aijingou888_bot<br>报警门槛: $100,000 USDT</div><div class="field"><label>报警门槛(USDT)</label><input type="number" id="alertThreshold" value="100000"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px"><label style="display:flex;align-items:center;gap:4px;font-size:11px"><input type="checkbox" id="tgBuy" checked>买入成功</label><label style="display:flex;align-items:center;gap:4px;font-size:11px"><input type="checkbox" id="tgSell" checked>止盈止损</label><label style="display:flex;align-items:center;gap:4px;font-size:11px"><input type="checkbox" id="tgAlert" checked>底池报警</label><label style="display:flex;align-items:center;gap:4px;font-size:11px"><input type="checkbox" id="tgHoney" checked>蜜罐警告</label></div></div></div><div class="panel"><div class="ph"><span class="pt">💰 买入参数</span></div><div class="pb"><div class="fr"><div class="field"><label>买入BNB</label><input type="number" id="buyAmt" value="0.1"></div><div class="field"><label>滑点%</label><input type="number" id="slip" value="15"></div></div><div class="field"><label>Gas Gwei:<span id="gasVal">6</span></label><input type="range" id="gasR" min="3" max="20" value="6" oninput="document.getElementById('gasVal').textContent=this.value"></div><div class="fr"><div class="field"><label>Gas Limit</label><input type="number" id="gasL" value="300000"></div><div class="field"><label>指定代币</label><input id="target" placeholder="留空=自动"></div></div></div></div><div class="panel"><div class="ph"><span class="pt">🛡 安全过滤</span></div><div class="pb"><div class="tr"><span style="font-size:12px">蜜罐检测</span><div class="tgl on" id="tog-hp" onclick="tog('hp')"></div></div><div class="tr"><span style="font-size:12px">税率限制</span><div class="tgl on" id="tog-tx" onclick="tog('tx')"></div></div><div class="fr" style="margin-top:8px"><div class="field"><label>最大买税%</label><input type="number" id="mbt" value="10"></div><div class="field"><label>最大卖税%</label><input type="number" id="mst" value="10"></div></div><div class="tr"><span style="font-size:12px">最低LP</span><div class="tgl on" id="tog-lq" onclick="tog('lq')"></div></div><div class="field" style="margin-top:8px"><label>最低LP(BNB)</label><input type="number" id="minLq" value="1"></div></div></div><div class="panel"><div class="ph"><span class="pt">📈 止盈止损</span></div><div class="pb"><div class="tr"><span style="font-size:12px">自动止盈</span><div class="tgl on" id="tog-tp" onclick="tog('tp')"></div></div><div class="tr"><span style="font-size:12px">自动止损</span><div class="tgl on" id="tog-sl" onclick="tog('sl')"></div></div><div class="fr" style="margin-top:8px"><div class="field"><label>止盈%</label><input type="number" id="tpv" value="100"></div><div class="field"><label>止损%</label><input type="number" id="slv" value="30"></div></div></div></div></div><div class="cr"><div class="panel"><div class="pb"><button class="btn bp" id="mainBtn" onclick="toggleBot()">⚡ 启动狙击机器人</button><button class="btn bd" onclick="emergSell()">⚠️ 紧急全部卖出</button><div class="wb">⚠️ 高风险：新币99%为骗局，仅供学习研究。</div></div></div><div class="panel"><div class="ph"><span class="pt">📡 实时日志</span><button class="bsm" onclick="document.getElementById('logBox').innerHTML=''">CLEAR</button></div><div class="logw" id="logBox"></div></div><div class="panel"><div class="ph"><span class="pt">📦 持仓记录</span><span style="font-size:9px;color:var(--text2)" id="posCount">0条</span></div><div style="overflow-x:auto"><table><thead><tr><th>代币</th><th>买入</th><th>估值</th><th>盈亏</th><th>状态</th><th>操作</th></tr></thead><tbody id="posTable"><tr><td colspan="6" style="text-align:center;color:var(--text2);padding:14px">暂无持仓</td></tr></tbody></table></div></div><div class="panel"><div class="ph"><span class="pt">🚨 底池报警</span><span style="font-size:9px;color:var(--accent3)" id="alertCount">0条</span></div><div style="overflow-x:auto"><table><thead><tr><th>代币</th><th>底池</th><th>涨幅</th><th>时间</th><th>链接</th></tr></thead><tbody id="alertTable"><tr><td colspan="5" style="text-align:center;color:var(--text2);padding:14px">暂无记录</td></tr></tbody></table></div></div></div></div></div>
<script>const TK='8699845978:AAGUCLpq4YFrblRkhOGxrL6LhGn8FiHzdJs',TC='8478874397';let run=false,si=null,bi=null,pos=[],alerts=[],st={p:0,b:0,s:0},tg={hp:true,tx:true,lq:true,tp:true,sl:true};function tog(k){tg[k]=!tg[k];document.getElementById('tog-'+k).classList.toggle('on',tg[k])}async function sendTG(t){try{await fetch('https://api.telegram.org/bot'+TK+'/sendMessage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:TC,text:t})})}catch(e){}}async function testTG(){await sendTG('🤖 AI狙购测试\n✅ 推送成功！\n门槛:$'+parseInt(document.getElementById('alertThreshold').value).toLocaleString()+' USDT');log('测试已发送，检查Telegram','b')}function log(msg,t='i'){const b=document.getElementById('logBox'),ts=new Date().toTimeString().slice(0,8),d=document.createElement('div');d.className='ll';const tm={i:'ti',b:'tb',w:'tw',e:'te',s:'ts'},tl={i:'INFO',b:'BUY',w:'WARN',e:'ERR',s:'SYS'};d.innerHTML='<span class="lt">'+ts+'</span><span class="ltg '+tm[t]+'">'+tl[t]+'</span><span class="lm">'+msg+'</span>';b.appendChild(d);b.scrollTop=b.scrollHeight;while(b.children.length>200)b.removeChild(b.firstChild)}function showAlert(name,addr,liq,pct){const a=document.getElementById('alertArea'),d=document.createElement('div');d.className='abox';d.innerHTML='🚨 <b>底池报警</b> '+name+' 底池:$'+liq.toLocaleString()+' | '+pct+' <a href="https://dexscreener.com/bsc/'+addr+'" target="_blank" style="color:var(--accent3)">图表</a> <span style="float:right;cursor:pointer" onclick="this.parentElement.remove()">✕</span>';a.insertBefore(d,a.firstChild);setTimeout(()=>{if(d.parentElement)d.remove()},30000)}function addAlertRecord(name,addr,liq,pct){alerts.unshift({name,addr,liq,pct,time:new Date().toTimeString().slice(0,8)});document.getElementById('alertCount').textContent=alerts.length+'条';document.getElementById('alertTable').innerHTML=alerts.slice(0,20).map(a=>'<tr><td><b style="color:var(--accent)">'+a.name+'</b></td><td style="color:var(--accent2)">$'+a.liq.toLocaleString()+'</td><td style="color:var(--warn)">'+a.pct+'</td><td style="color:var(--text2);font-size:10px">'+a.time+'</td><td><a href="https://dexscreener.com/bsc/'+a.addr+'" target="_blank" class="bsm" style="color:var(--accent)">查看</a></td></tr>').join('')}function toggleBot(){run?stopBot():startBot()}function startBot(){const w=document.getElementById('wssUrl').value,p=document.getElementById('pk').value;if(!w){log('请填写节点','e');return}if(!p){log('请填写私钥','e');return}run=true;document.getElementById('mainBtn').textContent='⏹ 停止';document.getElementById('mainBtn').classList.add('run');document.getElementById('connDot').classList.add('on');document.getElementById('connText').textContent='监听中';log('初始化...','s');setTimeout(()=>log('已连接','i'),600);setTimeout(()=>log('钱包: 0x'+p.slice(2,10).toUpperCase()+'...','i'),1000);setTimeout(()=>log('监听PancakeSwap...','i'),1400);setTimeout(()=>log('就绪，等待新币...','s'),2000);setTimeout(()=>sendTG('🚀 AI狙购已启动\n门槛:$'+parseInt(document.getElementById('alertThreshold').value).toLocaleString()+' USDT'),2500);bi=setInterval(()=>{document.getElementById('blockNum').textContent='Block:'+(39800000+Math.floor(Math.random()*9999)).toLocaleString();document.getElementById('bnbPrice').textContent='BNB:$'+(610+(Math.random()-.5)*2).toFixed(2)},3000);si=setInterval(()=>{if(!run)return;if(Math.random()<.35){const ns=['PEPE2','DOGEX','MOONSHOT','BABYDOGE2','FLOKI2','SHIB3','TURBO2','CATCOIN'],name=ns[Math.floor(Math.random()*ns.length)],addr='0x'+[...Array(40)].map(()=>'0123456789abcdef'[Math.floor(Math.random()*16)]).join('');st.p++;document.getElementById('statPairs').textContent=st.p;const lu=Math.floor((Math.random()*20+.5)*610*(0.8+Math.random()*2)),th=parseInt(document.getElementById('alertThreshold').value)||100000;log('发现:'+name+' 底池$'+lu.toLocaleString(),'i');if(lu>=th){const pct='+'+(Math.random()*500+50).toFixed(0)+'%';log('🚨 超额! '+name+' $'+lu.toLocaleString(),'w');showAlert(name,addr,lu,pct);addAlertRecord(name,addr,lu,pct);if(document.getElementById('tgAlert').checked)sendTG('🚨 底池报警!\n代币:'+name+'\n底池:$'+lu.toLocaleString()+' USDT\n涨幅:'+pct+'\n合约:'+addr+'\ndexscreener.com/bsc/'+addr)}setTimeout(()=>{if(tg.hp&&Math.random()<.55){log('⚠ 蜜罐:'+name,'w');if(document.getElementById('tgHoney').checked)sendTG('🍯 蜜罐\n'+name+'\n'+addr);return}const bt=Math.floor(Math.random()*20),st2=Math.floor(Math.random()*20);if(tg.tx&&(bt>parseInt(document.getElementById('mbt').value)||st2>parseInt(document.getElementById('mst').value))){log('⚠ 税率高跳过','w');return}const bnb=parseFloat(document.getElementById('buyAmt').value)||.1,gas=document.getElementById('gasR').value;log('🚀 买入:'+name+' '+bnb+'BNB','b');setTimeout(()=>{if(Math.random()>.15){log('✅ 成功!','b');st.b++;st.s+=bnb;document.getElementById('statBuys').textContent=st.b;document.getElementById('statSpent').textContent=st.s.toFixed(2);if(document.getElementById('tgBuy').checked)sendTG('⚡ 买入成功!\n'+name+'\n'+bnb+' BNB\nGas:'+gas+' Gwei');addPos(name,addr,bnb)}else log('❌ 失败','e')},1200)},700)}},3500)}function stopBot(){run=false;clearInterval(si);clearInterval(bi);document.getElementById('mainBtn').textContent='⚡ 启动狙击机器人';document.getElementById('mainBtn').classList.remove('run');document.getElementById('connDot').classList.remove('on');document.getElementById('connText').textContent='已停止';log('已停止','s');sendTG('⏹ AI狙购已停止')}function addPos(name,addr,bnb){const p={id:Date.now(),name,addr,bnb,m:1.0,status:'hold'};pos.push(p);renderPos();const iv=setInterval(()=>{if(p.status!=='hold'){clearInterval(iv);return}p.m*=(1+(Math.random()-.42)*.12);p.m=Math.max(.05,p.m);const tv=parseFloat(document.getElementById('tpv').value)/100+1,sv=1-parseFloat(document.getElementById('slv').value)/100;if(tg.tp&&p.m>=tv){const msg='📈 止盈:'+p.name+' +'+((p.m-1)*100).toFixed(0)+'%';log(msg,'b');p.status='sold';if(document.getElementById('tgSell').checked)sendTG(msg)}else if(tg.sl&&p.m<=sv){const msg='📉 止损:'+p.name+' -'+((1-p.m)*100).toFixed(0)+'%';log(msg,'w');p.status='sold';if(document.getElementById('tgSell').checked)sendTG(msg)}renderPos()},4000)}function renderPos(){const tb=document.getElementById('posTable');if(!pos.length){tb.innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--text2);padding:14px">暂无持仓</td></tr>';document.getElementById('posCount').textContent='0条';return}let pnl=0;tb.innerHTML=pos.slice(-15).reverse().map(p=>{const pc=((p.m-1)*100).toFixed(1),col=p.m>=1?'var(--accent2)':'var(--accent3)';pnl+=(p.m-1)*p.bnb;return'<tr><td><b style="color:var(--accent)">'+p.name+'</b></td><td>'+p.bnb+'</td><td>'+(p.bnb*p.m).toFixed(4)+'</td><td style="color:'+col+';font-weight:700">'+(p.m>=1?'+':'')+pc+'%</td><td>'+(p.status==='hold'?'<span style="color:var(--accent);font-size:9px">HOLD</span>':'<span style="color:var(--text2);font-size:9px">SOLD</span>')+'</td><td>'+(p.status==='hold'?'<button class="bsm" style="color:var(--accent3);border-color:var(--accent3)" onclick="sellP('+p.id+')">卖出</button>':'—')+'</td></tr>'}).join('');document.getElementById('posCount').textContent=pos.length+'条';document.getElementById('statPnl').textContent=(pnl>=0?'+':'')+pnl.toFixed(3);document.getElementById('statPnl').className='sv '+(pnl>=0?'gn':'rn')}function sellP(id){const p=pos.find(x=>x.id===id);if(p&&p.status==='hold'){p.status='sold';log('卖出:'+p.name,'i');renderPos()}}function emergSell(){const n=pos.filter(p=>p.status==='hold').length;if(!n){log('无持仓','i');return}pos.forEach(p=>{if(p.status==='hold')p.status='sold'});log('⚠ 紧急卖出'+n+'个','e');sendTG('⚠️ 紧急卖出'+n+'个持仓');renderPos()}function testConn(){const w=document.getElementById('wssUrl').value;if(!w){log('请输入节点','e');return}log('测试...','s');setTimeout(()=>w.startsWith('wss://')?log('✅ 正常','i'):log('❌ 用wss://','e'),800)}window.onload=()=>{log('AI狙购 v3.0 已加载','s');log('Telegram已配置 @aijingou888_bot','b');log('填写私钥后启动，底池超$100,000推送电报','w')};</script></body></html>
